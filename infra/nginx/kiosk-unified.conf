server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|avif|webp|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # Micro-frontend remote: menu
    location /menu/ {
        try_files $uri $uri/ /menu/index.html;
    }

    # Micro-frontend remote: cart
    location /cart/ {
        try_files $uri $uri/ /cart/index.html;
    }

    # Micro-frontend remote: payment
    location /payment/ {
        try_files $uri $uri/ /payment/index.html;
    }

    # Admin dashboard
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Kiosk shell SPA
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy no-referrer;
    }

    # Health check
    location /healthz {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
