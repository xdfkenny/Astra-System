apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: astra-service
  labels:
    app.kubernetes.io/name: cart-service
    app.kubernetes.io/component: service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cart-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cart-service
        app.kubernetes.io/component: service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: Localhost
          localhostProfile: astra-go-service
      containers:
        - name: cart-service
          image: astra/cart-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: astra-config
          env:
            - name: ASTRA_PORT
              value: "8081"
            - name: ASTRA_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: astra-secrets
                  key: postgres-url
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 125m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
