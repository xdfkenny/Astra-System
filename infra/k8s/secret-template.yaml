apiVersion: v1
kind: Secret
metadata:
  name: astra-secrets
  namespace: astra-service
type: Opaque
stringData:
  # Replace these placeholder values with values injected by your secrets manager
  # (e.g. Vault, Sealed Secrets, External Secrets Operator).
  postgres-password: "REPLACE_ME"
  postgres-url: "postgres://astra:REPLACE_ME@postgres:5432/astra_service?sslmode=require"
  redis-password: "REPLACE_ME"
  nats-token: "REPLACE_ME"
  jwt-secret: "REPLACE_ME"
  api-key: "REPLACE_ME"
