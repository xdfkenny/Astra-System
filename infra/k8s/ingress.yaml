apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: astra-ingress
  namespace: astra-service
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "astra-issuer"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.astra.local
      secretName: astra-gateway-tls
  rules:
    - host: api.astra.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: astra-service
spec:
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
