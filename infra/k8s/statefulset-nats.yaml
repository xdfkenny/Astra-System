apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: astra-service
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: message-bus
spec:
  serviceName: nats
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/component: message-bus
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: nats
          image: nats:2-alpine
          command:
            - nats-server
            - --jetstream
            - --store_dir
            - /data/jetstream
            - --max_memory_store
            - 1GB
            - --max_file_store
            - 4GB
            - --cluster_name
            - astra
            - --cluster
            - nats://0.0.0.0:6222
            - --routes
            - nats://nats-0.nats:6222,nats://nats-1.nats:6222,nats://nats-2.nats:6222
          ports:
            - name: client
              containerPort: 4222
            - name: cluster
              containerPort: 6222
            - name: monitor
              containerPort: 8222
          volumeMounts:
            - name: data
              mountPath: /data/jetstream
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: astra-service
spec:
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: cluster
      port: 6222
      targetPort: 6222
    - name: monitor
      port: 8222
      targetPort: 8222
  clusterIP: None
