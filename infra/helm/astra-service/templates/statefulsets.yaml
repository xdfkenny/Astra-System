{{- if .Values.nats.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "astra.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  serviceName: nats
  replicas: {{ .Values.nats.replicas }}
  selector:
    matchLabels:
      {{- include "astra.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        {{- include "astra.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nats
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image }}
          ports:
            - containerPort: {{ .Values.nats.port }}
              name: client
            - containerPort: {{ .Values.nats.clusterPort }}
              name: cluster
            - containerPort: {{ .Values.nats.httpPort }}
              name: http
          args:
            - "--cluster_name=ASTRA"
            - "--cluster_listener=nats://0.0.0.0:6222"
            - "--http_port=8222"
            - "--store_dir=/data"
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.nats.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: {{ .Values.nats.port }}
      name: client
    - port: {{ .Values.nats.clusterPort }}
      name: cluster
    - port: {{ .Values.nats.httpPort }}
      name: http
  selector:
    {{- include "astra.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nats
  clusterIP: None
{{- end }}

