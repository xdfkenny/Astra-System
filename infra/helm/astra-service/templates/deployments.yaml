{{- range $name, $service := .Values }}
{{- if and (kindIs "map" $service) $service.enabled $service.port (not (has $name (list "nats" "redis" "postgres" "otelCollector" "prometheus" "loki" "grafana" "imagePullSecrets" "networkPolicy" "global"))) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name | replace "_" "-" }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "astra.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $service.replicas | default 1 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "astra.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "astra.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") $ | sha256sum }}
    spec:
      serviceAccountName: {{ include "astra.serviceAccountName" $ }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ $name | replace "_" "-" }}
          image: {{ $.Values.global.registry }}/{{ $service.image.repository }}:{{ $service.image.tag }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $service.port }}
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "astra.fullname" $ }}-config
          env:
            - name: SERVICE_NAME
              value: {{ $name | replace "_" "-" }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.postgres.secretName }}
                  key: password
                  optional: true
          resources:
            {{- toYaml ($service.resources | default $.Values.global.resources) | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name | replace "_" "-" }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "astra.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "astra.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
{{- end }}
{{- end }}
