version: v2
modules:
  - path: proto
    excludes:
      - proto/google
lint:
  use:
    - MINIMAL
  except:
    - PACKAGE_DIRECTORY_MATCH
    - DIRECTORY_SAME_PACKAGE
breaking:
  use:
    - FILE
  # BSR integration — pushes generated modules on main-branch CI.
  # Set BUF_TOKEN in GitHub secrets for authenticated pushes.
  # See https://buf.build/docs/bsr/overview
  # remote: https://buf.build/astra-systems/schema
deps:
  - buf.build/googleapis/googleapis
