# CI override for the integration-test stack.
#
# The base docker-compose.yml hardens postgres/redis/nats with explicit
# non-root `user:` UIDs plus `cap_drop: ALL` + `cap_add: [SETGID, SETUID]`.
# On GitHub-hosted runners the OCI runtime cannot set up those users
# ("setgroups: operation not permitted"), so this override relaxes the
# capability/security restrictions for the integration job only. Local
# development keeps the hardened defaults from docker-compose.yml.
services:
  postgres:
    user: "0:0"
    cap_drop: []
    cap_add: []
    security_opt: []
  redis:
    user: "0:0"
    cap_drop: []
    cap_add: []
    security_opt: []
  nats:
    user: "0:0"
    cap_drop: []
    cap_add: []
    security_opt: []
