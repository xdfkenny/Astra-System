name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.12.0'
  GO_VERSION: '1.25'
  RUST_VERSION: '1.93'
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      ops: ${{ steps.filter.outputs.ops }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            typescript:
              - 'astra-service/apps/**'
              - 'astra-service/packages/**'
              - 'astra-service/package.json'
              - 'astra-service/pnpm-lock.yaml'
              - 'astra-service/tsconfig.base.json'
              - 'astra-service/turbo.json'
            go:
              - 'astra-service/services/**'
              - 'astra-service/packages/go-common/**'
              - 'astra-service/go.work'
              - 'astra-service/go.work.sum'
              - 'services/update-server/**'
              - 'infra/secrets/**'
              - 'proto/**'
            python:
              - 'astra-service/services/ml-lane-intel/**'
            rust:
              - 'astra-service/sync-daemon/**'
              - 'astra-service/daemons/**'
            ops:
              - 'infra/**'
              - 'infra/helm/**'
              - 'infra/terraform/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'
              - 'infra/docker/Dockerfile.*'

  lint-ts:
    needs: changes
    if: ${{ needs.changes.outputs.typescript == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'astra-service/pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
        working-directory: astra-service
      - run: pnpm turbo run lint typecheck --concurrency=100%
        working-directory: astra-service

  lint-proto:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v7
      - uses: bufbuild/buf-action@v1
        with:
          version: "1.50.0"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          input: proto
          format: true
          lint: true
          breaking: ${{ github.base_ref == 'main' || github.ref == 'refs/heads/main' }}
          breaking_against: "https://github.com/${{ github.repository }}.git#branch=main,subdir=proto"
          push: ${{ github.ref == 'refs/heads/main' }}
          token: ${{ secrets.BUF_TOKEN || '' }}

  lint-go:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - path: astra-service/services/gateway
          - path: astra-service/services/menu-service
          - path: astra-service/services/cart-service
          - path: astra-service/services/order-service
          - path: astra-service/services/inventory-service
          - path: astra-service/services/payment-orchestrator
          - path: astra-service/services/payment-service
          - path: astra-service/services/sync-service
          - path: astra-service/services/api-gateway
          - path: astra-service/services/webauthn-service
          - path: astra-service/services/admin-graphql
          - path: astra-service/services/legacy-pos-adapter
          - path: astra-service/packages/go-common
          - path: services/update-server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate protobuf Go code
        working-directory: proto
        run: |
          mkdir -p gen/go
          protoc -I proto \
            --go_out=. --go_opt=module=github.com/astra-systems/astra-service/proto \
            --go-grpc_out=. --go-grpc_opt=module=github.com/astra-systems/astra-service/proto \
            --grpc-gateway_out=. --grpc-gateway_opt=module=github.com/astra-systems/astra-service/proto \
            $(find proto -name '*.proto' ! -path '*/google/*')
      - name: Verify formatting
        run: |
          cd ${{ matrix.module.path }}
          go mod tidy
          test -z "$(gofmt -l .)"
      - name: Run go vet
        run: |
          cd ${{ matrix.module.path }}
          go vet ./...

  lint-rust:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [astra-service/sync-daemon, astra-service/daemons/payment-sidecar]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
      - uses: arduino/setup-protoc@v3
        if: ${{ contains(matrix.workspace, 'sync-daemon') }}
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.workspace }}
      - run: cargo fmt --check
        working-directory: ${{ matrix.workspace }}
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: ${{ matrix.workspace }}

  test-unit:
    needs: [changes, lint-ts, lint-go, lint-rust, lint-proto]
    if: ${{ always() && !failure() && !cancelled() && (needs.changes.outputs.typescript == 'true' || needs.changes.outputs.go == 'true' || needs.changes.outputs.rust == 'true') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: ts
            condition: ${{ needs.changes.outputs.typescript == 'true' }}
          - lang: go
            condition: ${{ needs.changes.outputs.go == 'true' }}
          - lang: rust
            condition: ${{ needs.changes.outputs.rust == 'true' }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        if: ${{ matrix.lang == 'ts' && matrix.condition == 'true' }}
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v7
        if: ${{ matrix.lang == 'ts' && matrix.condition == 'true' }}
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'astra-service/pnpm-lock.yaml'
      - name: Unit tests (TypeScript)
        if: ${{ matrix.lang == 'ts' && matrix.condition == 'true' }}
        run: |
          pnpm install --frozen-lockfile
          pnpm turbo run test --concurrency=100%
        working-directory: astra-service

      - uses: actions/setup-go@v7
        if: ${{ matrix.lang == 'go' && matrix.condition == 'true' }}
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Set up protoc
        if: ${{ matrix.lang == 'go' && matrix.condition == 'true' }}
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install protoc Go plugins
        if: ${{ matrix.lang == 'go' && matrix.condition == 'true' }}
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate protobuf Go code
        if: ${{ matrix.lang == 'go' && matrix.condition == 'true' }}
        working-directory: proto
        run: |
          mkdir -p gen/go
          protoc -I proto \
            --go_out=. --go_opt=module=github.com/astra-systems/astra-service/proto \
            --go-grpc_out=. --go-grpc_opt=module=github.com/astra-systems/astra-service/proto \
            --grpc-gateway_out=. --grpc-gateway_opt=module=github.com/astra-systems/astra-service/proto \
            $(find proto -name '*.proto' ! -path '*/google/*')
      - name: Unit tests (Go)
        if: ${{ matrix.lang == 'go' && matrix.condition == 'true' }}
        run: |
          rm -f /tmp/go-coverage.out
          for dir in astra-service/services/*/ astra-service/packages/go-common/ services/update-server/; do
            if [ -f "${dir}/go.mod" ]; then
              echo "==> testing ${dir}"
              (cd "${dir}" && go test -race -covermode=atomic -coverprofile=/tmp/cov.tmp ./... && cat /tmp/cov.tmp >> /tmp/go-coverage.out)
            fi
          done
          if [ -f /tmp/go-coverage.out ]; then
            go tool cover -func=/tmp/go-coverage.out | tail -1
          fi

      - name: Upload Go coverage
        if: ${{ matrix.lang == 'go' && matrix.condition == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: /tmp/go-coverage.out
          if-no-files-found: ignore

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ matrix.lang == 'rust' && matrix.condition == 'true' }}
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: arduino/setup-protoc@v3
        if: ${{ matrix.lang == 'rust' && matrix.condition == 'true' }}
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        if: ${{ matrix.lang == 'rust' && matrix.condition == 'true' }}
        with:
          workspaces: |
            astra-service/sync-daemon
            astra-service/daemons/payment-sidecar
      - name: Unit tests (Rust)
        if: ${{ matrix.lang == 'rust' && matrix.condition == 'true' }}
        run: |
          cargo test
          cd astra-service/daemons/payment-sidecar && cargo test
        working-directory: astra-service/sync-daemon

  test-integration:
    needs: [changes, test-unit]
    if: ${{ always() && !failure() && !cancelled() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ops == 'true') }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: astra
          POSTGRES_PASSWORD: astra-local-dev
          POSTGRES_DB: astra_service
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astra -d astra_service"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@v7
      - name: Wait for services
        run: |
          wait_port() { timeout 2 bash -c "cat < /dev/null > /dev/tcp/localhost/$1" 2>/dev/null; }
          for i in $(seq 1 60); do
            if wait_port 5432 && wait_port 6379 && wait_port 4222; then
              echo "All services up"; break
            fi
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "Timed out waiting for services" >&2
              exit 1
            fi
          done
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate protobuf Go code
        working-directory: proto
        run: |
          mkdir -p gen/go
          protoc -I proto \
            --go_out=. --go_opt=module=github.com/astra-systems/astra-service/proto \
            --go-grpc_out=. --go-grpc_opt=module=github.com/astra-systems/astra-service/proto \
            --grpc-gateway_out=. --grpc-gateway_opt=module=github.com/astra-systems/astra-service/proto \
            $(find proto -name '*.proto' ! -path '*/google/*')
      - name: Build Go services
        run: |
          for dir in astra-service/services/*/ services/update-server/; do
            if [ -f "${dir}/go.mod" ]; then
              echo "==> building ${dir}"
              (cd "${dir}" && go build ./...)
            fi
          done
      - name: Integration smoke tests
        run: |
          probe() { timeout 2 bash -c "cat < /dev/null > /dev/tcp/localhost/$1" 2>/dev/null; }
          for p in 5432 6379 4222; do
            if probe "$p"; then echo "port $p reachable"; else echo "port $p NOT reachable" >&2; exit 1; fi
          done

  test-python:
    needs: [changes, lint-proto]
    if: ${{ always() && !failure() && !cancelled() && needs.changes.outputs.python == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astra-service/services/ml-lane-intel
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --locked
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type check (mypy)
        run: uv run mypy src
      - name: Unit tests (pytest)
        run: uv run pytest -q --cov=src --cov-report=xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-ml-lane-intel
          path: astra-service/services/ml-lane-intel/coverage.xml
          if-no-files-found: ignore

  test-e2e:
    needs: [changes, lint-ts]
    if: ${{ always() && !failure() && !cancelled() && needs.changes.outputs.typescript == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'astra-service/pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
        working-directory: astra-service
      - name: Install Playwright browsers
        run: pnpm --filter @astra/kiosk exec playwright install --with-deps
        working-directory: astra-service
      - run: pnpm turbo run test:e2e --filter @astra/kiosk
        working-directory: astra-service

  security-audit:
    needs: changes
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'astra-service/pnpm-lock.yaml'

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate protobuf Go code
        working-directory: proto
        run: |
          mkdir -p gen/go
          protoc -I proto \
            --go_out=. --go_opt=module=github.com/astra-systems/astra-service/proto \
            --go-grpc_out=. --go-grpc_opt=module=github.com/astra-systems/astra-service/proto \
            --grpc-gateway_out=. --grpc-gateway_opt=module=github.com/astra-systems/astra-service/proto \
            $(find proto -name '*.proto' ! -path '*/google/*')

      - name: pnpm install
        if: always()
        run: pnpm install --frozen-lockfile
        working-directory: astra-service

      - name: cargo audit (Rust HIGH,CRITICAL only)
        if: always()
        run: |
          cargo install cargo-audit --locked
          cargo audit --json 2>/dev/null | jq -e '
            [.vulnerabilities.list // [] | .[] |
              select(.advisory.severity == "high" or .advisory.severity == "critical")] |
            if length > 0 then
              "FAIL: \(length) HIGH/CRITICAL advisory(ies) found" | halt_error(1)
            else
              "PASS: no HIGH/CRITICAL advisories"
            end
          '
        working-directory: astra-service/sync-daemon

      - name: govulncheck (Go)
        if: always()
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          for dir in astra-service/services/*/ astra-service/packages/go-common/ services/update-server/; do
            if [ -f "${dir}/go.mod" ]; then
              echo "==> scanning ${dir}"
              (cd "${dir}" && govulncheck ./...)
            fi
          done

      - name: Trivy filesystem scan (npm/go/rust HIGH,CRITICAL)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  secret-scan:
    needs: changes
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'

  iac-validate:
    needs: changes
    if: ${{ always() && !failure() && !cancelled() && needs.changes.outputs.ops == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~> 1.9

      - name: Terraform fmt & validate
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Helm lint & template
        working-directory: infra/helm/astra-service
        run: |
          helm dependency build
          helm lint .
          helm template . --dry-run=server > /dev/null

      - name: Validate Kubernetes manifests (kubeconform)
        run: |
          curl -sSLo /usr/local/bin/kubeconform https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64 && chmod +x /usr/local/bin/kubeconform
          kubeconform -strict -summary -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            $(find infra/k8s -name '*.yaml' -o -name '*.yml')

  build-docker:
    needs: [test-unit, test-integration, secret-scan, iac-validate]
    if: ${{ always() && !failure() && !cancelled() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/pull/')) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        image:
          - gateway
          - menu-service
          - cart-service
          - order-service
          - inventory-service
          - payment-orchestrator
          - payment-service
          - sync-service
          - update-server
          - webauthn-service
          - admin-graphql
          - legacy-pos-adapter
          - api-gateway
          - ml-lane-intel
          - kiosk
          - syncd
        include:
          - image: gateway
            dockerfile: infra/docker/Dockerfile.gateway
          - image: menu-service
            dockerfile: infra/docker/Dockerfile.menu-service
          - image: cart-service
            dockerfile: infra/docker/Dockerfile.cart-service
          - image: order-service
            dockerfile: infra/docker/Dockerfile.order-service
          - image: inventory-service
            dockerfile: infra/docker/Dockerfile.inventory-service
          - image: payment-orchestrator
            dockerfile: infra/docker/Dockerfile.payment-orchestrator
          - image: payment-service
            dockerfile: astra-service/services/payment-service/Dockerfile
          - image: sync-service
            dockerfile: infra/docker/Dockerfile.sync-service
          - image: update-server
            dockerfile: infra/docker/Dockerfile.update-server
          - image: webauthn-service
            dockerfile: infra/docker/Dockerfile.webauthn-service
          - image: admin-graphql
            dockerfile: infra/docker/Dockerfile.admin-graphql
          - image: legacy-pos-adapter
            dockerfile: astra-service/services/legacy-pos-adapter/Dockerfile
          - image: api-gateway
            dockerfile: astra-service/services/api-gateway/Dockerfile
          - image: ml-lane-intel
            dockerfile: infra/docker/Dockerfile.ml-lane-intel
          - image: kiosk
            dockerfile: infra/docker/Dockerfile.kiosk
          - image: syncd
            dockerfile: infra/docker/Dockerfile.syncd
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Normalize image namespace
        id: image
        run: echo "repository=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate protobuf Go code
        working-directory: proto
        run: |
          mkdir -p gen/go
          protoc -I proto \
            --go_out=. --go_opt=module=github.com/astra-systems/astra-service/proto \
            --go-grpc_out=. --go-grpc_opt=module=github.com/astra-systems/astra-service/proto \
            --grpc-gateway_out=. --grpc-gateway_opt=module=github.com/astra-systems/astra-service/proto \
            $(find proto -name '*.proto' ! -path '*/google/*')

      - name: Normalize platform tag
        id: plat
        run: |
          echo "tag=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=pr-${{ github.event.pull_request.number || github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.plat.outputs.ref }}-${{ steps.plat.outputs.tag }}
            type=raw,value=latest-${{ steps.plat.outputs.tag }},enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}

  sbom-generate:
    needs: [build-docker]
    if: ${{ github.ref == 'refs/heads/main' && always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        image:
          - gateway
          - menu-service
          - cart-service
          - order-service
          - inventory-service
          - payment-orchestrator
          - payment-service
          - sync-service
          - update-server
          - webauthn-service
          - admin-graphql
          - legacy-pos-adapter
          - api-gateway
          - ml-lane-intel
          - kiosk
          - syncd
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Normalize image namespace
        id: image
        run: echo "repository=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Normalize platform tag
        id: plat
        run: echo "tag=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.24.0
        id: install-syft

      - name: Generate and attest SBOM
        run: |
          mkdir -p /tmp/sboms
          syft ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}/${{ matrix.image }}:${{ github.sha }}-${{ steps.plat.outputs.tag }} \
            --platform ${{ matrix.platform }} \
            -o spdx-json=/tmp/sboms/${{ matrix.image }}-${{ steps.plat.outputs.tag }}.sbom.spdx.json
          cosign attest --yes \
            --predicate /tmp/sboms/${{ matrix.image }}-${{ steps.plat.outputs.tag }}.sbom.spdx.json \
            --type spdxjson \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}/${{ matrix.image }}:${{ github.sha }}-${{ steps.plat.outputs.tag }}

  merge-manifests:
    needs: [build-docker]
    if: ${{ github.ref == 'refs/heads/main' && always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - gateway
          - menu-service
          - cart-service
          - order-service
          - inventory-service
          - payment-orchestrator
          - payment-service
          - sync-service
          - update-server
          - webauthn-service
          - admin-graphql
          - legacy-pos-adapter
          - api-gateway
          - ml-lane-intel
          - kiosk
          - syncd
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Normalize image namespace
        id: image
        run: echo "repository=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create -t \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}/${{ matrix.image }}:${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}/${{ matrix.image }}:${{ github.sha }}-linux-amd64 \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}/${{ matrix.image }}:${{ github.sha }}-linux-arm64
          docker buildx imagetools create -t \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}/${{ matrix.image }}:latest \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}/${{ matrix.image }}:${{ github.sha }}-linux-amd64 \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}/${{ matrix.image }}:${{ github.sha }}-linux-arm64

  scan-images:
    needs: [merge-manifests]
    if: ${{ github.ref == 'refs/heads/main' && always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        image:
          - gateway
          - menu-service
          - cart-service
          - order-service
          - inventory-service
          - payment-orchestrator
          - payment-service
          - sync-service
          - update-server
          - webauthn-service
          - admin-graphql
          - legacy-pos-adapter
          - api-gateway
          - ml-lane-intel
          - kiosk
          - syncd
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Normalize platform tag
        id: plat
        run: echo "tag=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/xdfkenny/astra-system/${{ matrix.image }}:${{ github.sha }}-${{ steps.plat.outputs.tag }}
          format: sarif
          output: trivy-${{ matrix.image }}-${{ steps.plat.outputs.tag }}.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}-${{ steps.plat.outputs.tag }}.sarif
          category: trivy-${{ matrix.image }}-${{ steps.plat.outputs.tag }}

  release:
    needs: [build-docker, sbom-generate, merge-manifests, scan-images]
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'astra-service/pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
        working-directory: astra-service
      - name: Check for pending changesets
        id: changesets
        working-directory: astra-service
        run: |
          pnpm changeset status --since=origin/main >/dev/null 2>&1 || true
          COUNT=$(ls .changeset/*.md 2>/dev/null | grep -v README | wc -l | tr -d ' ')
          echo "pending=$COUNT" >> "$GITHUB_OUTPUT"
      - name: Version & tag release
        if: ${{ steps.changesets.outputs.pending != '0' }}
        working-directory: astra-service
        run: |
          pnpm changeset version
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD --tags
      - name: Create GitHub release
        if: ${{ steps.changesets.outputs.pending != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./astra-service/package.json').version")
          gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes

  chaos:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check chaos flag
        id: chaos-flag
        run: echo "enabled=${{ vars.ASTRA_RUN_CHAOS || false }}" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        if: steps.chaos-flag.outputs.enabled == 'true'
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Build chaos tool
        if: steps.chaos-flag.outputs.enabled == 'true'
        working-directory: astra-service/tools/chaos
        run: cargo build --release
      - name: Dry-run disk-pressure test
        if: steps.chaos-flag.outputs.enabled == 'true'
        working-directory: astra-service/tools/chaos
        run: cargo run --release -- disk-pressure --dry-run --dir /tmp/astra-chaos-disk --duration 5s
      - name: Dry-run memory-pressure test
        if: steps.chaos-flag.outputs.enabled == 'true'
        working-directory: astra-service/tools/chaos
        run: cargo run --release -- memory-pressure --dry-run --duration 5s
      - name: Build sync daemon image
        if: steps.chaos-flag.outputs.enabled == 'true'
        run: docker build -f infra/docker/Dockerfile.syncd -t astra-syncd:chaos .
      - name: Unit the chaos crate
        if: steps.chaos-flag.outputs.enabled == 'true'
        working-directory: astra-service/tools/chaos
        run: cargo test

      - name: Partition-resilience test (requires privileged runner)
        if: ${{ false }}
        run: |
          echo "Partition tests require pumba/toxiproxy on a privileged runner."
          echo "See tools/chaos/README.md for setup instructions."
